<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan's Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.95rem;
            color: #888;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .project-card {
            display: block;
            text-decoration: none;
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            border-color: #444;
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .project-card .emoji {
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .project-card .title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.4rem;
        }

        .project-card .desc {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.5;
        }

        .project-card .tag {
            display: inline-block;
            font-size: 0.7rem;
            color: #666;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 8px;
            margin-top: 0.75rem;
        }

        .project-card .arrow {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #444;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .project-card:hover .arrow {
            color: #888;
            transform: translateY(-50%) translateX(4px);
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #444;
        }

        /* placeholder for future projects */
        .project-card.coming-soon {
            opacity: 0.4;
            pointer-events: none;
        }

        .project-card.coming-soon .tag {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ethan's Lab 🧪</h1>
            <p>思维实验 · 认知工具 · 持续迭代</p>
        </div>

        <div class="projects">
            <a href="./collision/" class="project-card">
                <span class="emoji">💥</span>
                <div class="title">认知碰撞 Collision</div>
                <div class="desc">每日异质观点推送，结构化碰撞与深化对话。用不舒服的角度审视习以为常的假设。</div>
                <span class="tag">每日更新</span>
                <span class="arrow">→</span>
            </a>

            <div class="project-card coming-soon">
                <span class="emoji">🧠</span>
                <div class="title">更多项目即将上线</div>
                <div class="desc">新项目会自动出现在这里。</div>
                <span class="tag">Coming Soon</span>
            </div>
        </div>

        <div class="footer">
            Built with curiosity · Powered by WorkBuddy
        </div>
    </div>
</body>
</html>
